# Chronos Node Configuration
# This is the default configuration file. You can override these settings
# by creating a separate file and passing its path with the --config flag.

# --- Core Node Settings ---
# This section defines the fundamental operational mode and data storage for the node.
[node]
# node_type: The operational mode of the node.
# "full": Stores the entire blockchain history and validates all blocks and transactions.
# "light": Stores only block headers and relies on full nodes for most validation.
node_type = "full"

# data_dir: The directory where blockchain data, state, and snapshots are stored.
# The path is relative to the executable's location unless an absolute path is provided.
data_dir = "data"


# --- Network Configuration ---
# This section controls how the node connects to and communicates with the P2P network.
[network]
# listen_addr: The IP address on which the node listens for incoming P2P connections.
# "0.0.0.0" means it will listen on all available network interfaces.
listen_addr = "0.0.0.0"

# listen_port: The TCP port for incoming P2P connections.
# This port must be reachable by other nodes in the network.
listen_port = 8645

# seeds: A list of initial peer addresses (IP:port) to connect to when the node starts.
# This helps the node bootstrap and discover other peers in the network.
seeds = ["127.0.0.1:8645"]


# --- RPC (Remote Procedure Call) Server ---
# This section configures the API endpoint for interacting with the node.
[rpc]
# port: The TCP port on which the node's JSON-RPC server listens.
# This is used by wallets and other applications to send transactions or query the blockchain.
port = 8080


# --- P2P Protocol Settings ---
# Fine-tuning for the peer-to-peer communication layer.
[p2p]
# gossip_topics: A list of channels the node subscribes to for gossiping messages.
# Default topics include "blocks", "txs" (transactions), and "timeproofs".
gossip_topics = ["blocks", "txs", "timeproofs"]


# --- Consensus Algorithm ---
# Parameters that govern the consensus mechanism (BFT and Proof-of-Time).
[consensus]
# bft_round_timeout_ms: The duration in milliseconds for a single BFT round.
# If consensus is not reached within this time, the round may time out.
bft_round_timeout_ms = 5000

# slot_ms: The duration of a consensus time slot in milliseconds.
slot_ms = 1000

# bft_quorum: The minimum percentage of votes (as a float) required to reach a decision in the BFT protocol.
# 0.67 represents a 2/3+ majority.
bft_quorum = 0.67

# outlier_mad_factor: A factor used in the Proof-of-Time algorithm to detect and discard
# time measurements that are significant outliers from the median.
outlier_mad_factor = 6.0

# min_threshold_ms: The minimum time difference in milliseconds that the Proof-of-Time
# mechanism will attempt to correct.
min_threshold_ms = 5.0

# validators: A list of public keys (as hex strings) for the nodes authorized to participate in BFT consensus.
# This list must be identical for all nodes in the network.
validators = [
    ""
]


# --- External Time Sources ---
# Configuration for synchronizing the node's clock for Proof-of-Time.
[external_time_sources]
# ntp_servers: A list of public NTP (Network Time Protocol) servers to query for accurate time.
ntp_servers = ["pool.ntp.org", "time.google.com", "time.cloudflare.com"]

# ntp_query_interval_ms: The interval in milliseconds at which to query the NTP servers.
ntp_query_interval_ms = 5000


# --- Cryptography Settings ---
# Defines the cryptographic algorithms used by the node.
[crypto]
# sign_alg: The algorithm used for creating digital signatures.
# "dilithium_2" is a post-quantum algorithm, effective when the node is compiled with CHRONOS_USE_OQS=ON.
sign_alg = "dilithium_2"

# prehash: The hashing algorithm used to hash data before signing.
# "blake3-256" is a fast and modern hashing algorithm.
prehash = "blake3-256"

# addr_hrp: The "human-readable part" of Chronos addresses (e.g., "cqc" in cqc1...).
addr_hrp = "cqc"

# private_key: The secret private key for this node, used for signing blocks and transactions.
# THIS MUST BE KEPT SECRET. Generate it using the 'wallet_cli generate-keys' command.
# This should be a hex-encoded string.
private_key = ""


# --- Tokenomics ---
# Defines the economic parameters of the blockchain.
[tokenomics]
# block_reward_nanos: The reward amount (in the smallest unit, "nanos") given to a block producer.
# 100,000,000 nanos = 1 CQC (example).
block_reward_nanos = 100000000

# base_fee_nanos: The base fee for processing a transaction.
base_fee_nanos = 1000


# --- Genesis Block Configuration ---
# This section defines the initial state of the blockchain at genesis.
[genesis]
# consensus_time: The consensus timestamp for the genesis block (milliseconds since epoch).
# Set to 0 for network launch, or a specific timestamp for reproducibility.
consensus_time = 0

# expected_hash: The expected hash of the genesis block (hex-encoded).
# Used to validate that all nodes start with the same genesis state.
# Leave empty to skip validation (useful during development).
expected_hash = ""

# max_supply_per_account: Maximum balance allowed per account (overflow protection).
# Prevents balance arithmetic overflows and ensures economic constraints.
max_supply_per_account = 1000000000000000

# allocations: Initial balance allocations at genesis.
# Format: "address" = balance_in_nanos
# These accounts will have the specified balances when the blockchain starts.
[genesis.allocations]
# Example: "cqc1validatoraddr123" = 1000000000
# Add your genesis allocations here